from tests.base import ApiTestCase


class InventoryTests(ApiTestCase):
    def test_inventory_crud_requires_mechanic_token(self):
        denied = self.client.post("/inventory/", json={"name": "Alternator", "price": 249.99})
        self.assertEqual(denied.status_code, 401)

        headers = self.mechanic_headers()
        created = self.client.post(
            "/inventory/",
            headers=headers,
            json={"name": "Alternator", "price": 249.99},
        )
        self.assertEqual(created.status_code, 201)
        part_id = created.get_json()["id"]

        updated = self.client.put(
            f"/inventory/{part_id}",
            headers=headers,
            json={"price": 229.99},
        )
        self.assertEqual(updated.status_code, 200)
        self.assertEqual(updated.get_json()["price"], 229.99)

        listed = self.client.get("/inventory/")
        self.assertEqual(listed.status_code, 200)
        self.assertEqual(len(listed.get_json()), 1)

        deleted = self.client.delete(f"/inventory/{part_id}", headers=headers)
        self.assertEqual(deleted.status_code, 200)
